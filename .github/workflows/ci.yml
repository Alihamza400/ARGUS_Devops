name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/argus_devops_2026
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p argus_devops_2026 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        working-directory: server
        run: pip install -r requirements.txt

      - name: Lint with ruff
        working-directory: server
        run: ruff check app/ tests/ scripts/ --output-format github

      - name: Run migrations
        working-directory: server
        run: curl -X POST http://localhost:8000/graph/schema/migrate || true

      - name: Run tests with coverage
        working-directory: server
        run: pytest -v --junitxml=results.xml --cov=app --cov-report=term --cov-report=xml --tb=short

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: server/results.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage.xml
