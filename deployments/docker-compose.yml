services:
  neo4j:
    image: neo4j:5-community
    container_name: argus-neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-argus_devops_2026}
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-argus_devops_2026} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  argus-server:
    image: ghcr.io/alihamza400/argus_devops:latest
    container_name: argus-server
    pull_policy: always
    ports:
      - "8000:8000"
    environment:
      ARGUS_NEO4J_URI: bolt://neo4j:7687
      ARGUS_NEO4J_USER: neo4j
      ARGUS_NEO4J_PASSWORD: ${NEO4J_PASSWORD:-argus_devops_2026}
      ARGUS_NEO4J_DATABASE: neo4j
      ARGUS_ENV: ${ARGUS_ENV:-production}
      ARGUS_GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      ARGUS_K8S_WATCHER_ENABLED: ${K8S_WATCHER_ENABLED:-false}
      ARGUS_K8S_WATCHER_NAMESPACE: ${K8S_WATCHER_NAMESPACE:-}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
