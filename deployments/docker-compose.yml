version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: argus-neo4j
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/argus_devops_2026
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p argus_devops_2026 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  argus-server:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: argus-server
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: argus_devops_2026
      ARGUS_ENV: development
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ../server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  neo4j_data:
  neo4j_logs:
